<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ShuttleNote">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<title>ShuttleNote</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&family=Dela+Gothic+One&family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+JP:wght@500;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --black:#1a1a1a;
  --gray-1:#3a3530;
  --gray-2:#6b6358;
  --gray-3:#9a9088;
  --gray-4:#c5beb3;
  --gray-5:#e4ddd0;
  --gray-6:#f3ede0;
  --white:#FBF7F0;
  --pure-white:#fff;
  --hdr-bg:#f3ede0;
  --hdr-border:#e0d6c2;
  --accent:#9A3324;
  --accent-dark:#7a2618;
  --accent-bg:#f5e6df;
  --font-mono:'JetBrains Mono',monospace;
  --font-num:'Archivo',sans-serif;
  --font-serif:'Noto Serif JP',serif;
  --font-sans:'Noto Sans JP',sans-serif;
}
body{background:var(--white);font-family:var(--font-sans);color:var(--black);padding-bottom:64px;min-height:100vh;-webkit-font-smoothing:antialiased;}
button,input{font-family:var(--font-sans);cursor:pointer;}
input{outline:none;}

/* ヘッダー */
#hdr{position:sticky;top:0;z-index:30;background:var(--hdr-bg);border-bottom:1px solid var(--hdr-border);}
#hdr-inner{padding:16px 18px 12px;}
#hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
#logo{font-family:'Dela Gothic One',var(--font-sans);font-size:21px;font-weight:400;letter-spacing:.01em;color:var(--black);line-height:1;display:inline-block;transform:skewX(-9deg);font-style:normal;}
#logo .accent{color:var(--accent);}
#hdr-dots-cap{display:flex;justify-content:space-between;font-family:var(--font-sans);font-size:10px;font-weight:700;color:var(--gray-2);margin-bottom:6px;}
#hdr-dots-cap .num{font-family:var(--font-num);font-size:12px;font-weight:900;color:var(--accent);}
#hdr-dots{display:flex;gap:3px;}
.hdr-dot{flex:1;min-width:0;height:7px;border-radius:2px;background:var(--gray-5);}
.hdr-dot.past{background:#c9a99f;}
.hdr-dot.now{background:var(--accent);}

/* タブバー */
#tabbar{display:flex;background:var(--hdr-bg);position:sticky;top:0;z-index:29;border-bottom:1px solid var(--hdr-border);}
.tab-btn{flex:1;padding:10px 0;border:none;background:transparent;font-size:11px;color:var(--gray-2);font-weight:700;letter-spacing:.01em;white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--black);border-bottom:2px solid var(--accent);}

/* コンテンツ */
#content{padding:0 18px;}

/* 今日タブ */

/* トレーニングログ */
.log-cats{display:flex;gap:6px;padding:16px 0 12px;border-bottom:1px solid var(--gray-5);overflow-x:auto;}
.cat-btn{padding:7px 14px;border:1px solid var(--gray-5);background:var(--white);font-size:12px;font-weight:700;color:var(--gray-2);white-space:nowrap;border-radius:0;flex-shrink:0;transition:all .15s;}
.cat-btn.active{background:var(--black);color:var(--white);border-color:var(--black);}
.ex-bank{padding:12px 0;border-bottom:1px solid var(--gray-5);}
.bank-cat-head{display:inline-block;font-family:var(--font-sans);font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--white);background:var(--black);padding:5px 14px;margin:18px 0 8px;}
.bank-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-6);cursor:pointer;}
.bank-item:last-child{border-bottom:none;}
.bank-name{font-size:13px;font-weight:500;color:var(--gray-1);}
.bank-prev{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--gray-3);flex-shrink:0;margin-right:10px;white-space:nowrap;}
.bank-prev::before{content:"前回 ";font-family:var(--font-sans);font-size:9px;font-weight:500;color:var(--gray-4);}
.bank-prev .num{font-family:var(--font-num);font-weight:800;color:var(--gray-2);}
.bank-add{width:24px;height:24px;border:1.5px solid var(--gray-4);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--gray-2);flex-shrink:0;transition:all .15s;}
.bank-add:hover{background:var(--accent);color:var(--white);border-color:var(--accent);}
.log-input-wrap{background:var(--gray-6);padding:14px;margin:4px 0;}
.log-input-name{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--black);}
.log-input-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.log-input-label{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gray-2);width:40px;flex-shrink:0;}
.log-input{flex:1;padding:8px 10px;border:1px solid var(--gray-5);background:var(--pure-white);font-size:14px;font-weight:500;font-family:var(--font-sans);}
.log-input[type=number]{font-family:var(--font-num);font-weight:800;}
.log-input-btns{display:flex;gap:6px;margin-top:6px;}
.log-save{flex:1;padding:9px;border:none;background:var(--accent);color:var(--white);font-size:12px;font-weight:900;letter-spacing:.03em;}
.log-cancel{padding:9px 12px;border:1px solid var(--gray-5);background:var(--white);font-size:12px;font-weight:700;color:var(--gray-2);}
.log-today{padding:16px 0;}
.log-today-card{background:var(--gray-6);border-radius:12px;padding:6px 14px 12px;margin-top:4px;}
.log-today-head{display:flex;align-items:center;gap:8px;padding:12px 0 8px;border-bottom:1px solid var(--gray-5);margin-bottom:4px;}
.log-today-title{font-size:14px;font-weight:900;color:var(--black);position:relative;padding-left:12px;}
.log-today-title::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:15px;background:var(--accent);border-radius:2px;}
.log-today-count{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--white);background:var(--black);border-radius:10px;padding:2px 9px;}
.log-today-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gray-2);margin-bottom:10px;}
.log-entry{padding:10px 0;border-bottom:1px solid var(--gray-5);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.log-entry:last-child{border-bottom:none;}
.log-entry-name{font-size:13px;font-weight:700;color:var(--black);margin-bottom:3px;}
.log-entry-detail{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--gray-2);}
.log-entry-detail .num{font-family:var(--font-num);font-weight:800;color:var(--black);}
.log-entry-diff{font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;flex-shrink:0;white-space:nowrap;align-self:center;}
.log-entry-diff.up{background:var(--accent-bg);color:var(--accent-dark);}
.log-entry-diff.same{background:var(--white);color:var(--gray-3);border:1px solid var(--gray-5);}
.log-entry-del{width:24px;height:24px;border:none;background:transparent;color:var(--gray-4);font-size:17px;line-height:1;flex-shrink:0;align-self:center;}
.log-done-btn{width:100%;padding:14px;border:none;font-size:13px;font-weight:900;letter-spacing:.05em;margin-top:8px;transition:all .2s;}
.log-done-btn.idle{background:var(--accent);color:var(--white);}
.log-done-btn.done{background:var(--white);color:var(--gray-2);border:1px solid var(--gray-5);font-weight:700;}

/* 休養日 */
.rest-block{padding:32px 0;text-align:center;}
.rest-label{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--gray-3);margin-bottom:6px;}
.rest-title{font-size:20px;font-weight:900;margin-bottom:8px;color:var(--black);}
.rest-sub{font-size:13px;font-weight:500;color:var(--gray-2);line-height:1.8;}

/* カレンダー */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;}
.cal-nav-btn{width:34px;height:34px;border:1px solid var(--gray-5);background:var(--white);font-size:16px;font-weight:700;color:var(--gray-2);display:flex;align-items:center;justify-content:center;}
.cal-month{font-family:var(--font-mono);font-size:14px;font-weight:800;color:var(--black);}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-dow-cell{text-align:center;font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gray-2);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-num);font-size:13px;font-weight:800;border:1px solid transparent;position:relative;font-variant-numeric:tabular-nums;}
.cal-cell.today{background:var(--black);color:var(--white);}
.cal-cell.done-day{background:var(--gray-6);color:var(--black);}
.cal-cell.done-day::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
.cal-cell.match-day{border:1.5px solid var(--accent);background:var(--accent-bg);}
.cal-cell button{width:100%;height:100%;border:none;background:transparent;font-family:var(--font-num);font-size:13px;font-weight:800;color:inherit;}
.cal-detail{margin-top:14px;padding:14px;background:var(--gray-6);border-left:3px solid var(--accent);}
.cal-detail-date{font-size:13px;font-weight:700;margin-bottom:8px;}
.cal-detail-ex{font-size:12px;color:var(--gray-2);padding:3px 0;line-height:1.6;}
.cal-detail-btn{width:100%;padding:10px;border:none;background:var(--black);color:var(--white);font-size:12px;font-weight:800;margin-top:10px;}
.cal-detail-btn.done{background:var(--white);color:var(--gray-2);border:1px solid var(--gray-5);}


/* バンク編集 */
.bank-edit-wrap{padding:16px 0;}
.bank-edit-cat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-5);}
.bank-edit-cat-name{font-size:13px;font-weight:800;color:var(--black);}
.bank-edit-cat-del{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--gray-2);padding:4px 9px;border:1px solid var(--gray-5);background:var(--white);}
.bank-edit-ex-row{display:flex;align-items:center;gap:8px;padding:8px 0 8px 12px;border-bottom:1px solid var(--gray-6);}
.reorder-row{display:flex;align-items:center;gap:8px;padding:8px 0 8px 4px;border-bottom:1px solid var(--gray-6);background:var(--white);}
.reorder-row.dragging{background:var(--accent-bg);box-shadow:0 2px 8px rgba(0,0,0,.12);border-bottom:none;border-radius:4px;}
.drag-handle{font-size:15px;color:var(--gray-4);cursor:grab;padding:2px 6px;flex-shrink:0;user-select:none;line-height:1;}
.reorder-cat{display:flex;align-items:flex-start;gap:6px;padding:8px 0;border-bottom:1px solid var(--gray-5);background:var(--white);}
.reorder-cat .drag-handle{font-size:17px;color:var(--gray-3);padding-top:10px;}
.reorder-cat.dragging{background:var(--accent-bg);box-shadow:0 2px 10px rgba(0,0,0,.14);border-bottom:none;border-radius:6px;}
.bank-edit-ex-name{flex:1;font-size:12px;font-weight:500;color:var(--gray-1);}
.bank-edit-ex-type{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gray-3);}
.bank-edit-del{font-size:12px;font-weight:700;color:var(--gray-2);padding:3px 8px;border:1px solid var(--gray-5);background:var(--white);}
.bank-add-row{display:flex;gap:6px;padding:8px 0 8px 12px;}
.bank-add-input{flex:1;padding:7px 10px;border:1px solid var(--gray-5);font-size:12px;font-weight:500;font-family:var(--font-sans);}
.bank-add-type{padding:7px 10px;border:1px solid var(--gray-5);font-size:12px;font-weight:500;background:var(--white);font-family:var(--font-sans);}
.bank-add-btn{padding:7px 12px;border:none;background:var(--accent);color:var(--white);font-size:12px;font-weight:800;}
.bank-new-cat-row{display:flex;gap:6px;padding:14px 0 4px;}
.bank-new-cat-input{flex:1;padding:9px 10px;border:1px solid var(--gray-5);font-size:13px;font-weight:500;font-family:var(--font-sans);}
.bank-new-cat-btn{padding:9px 14px;border:none;background:var(--accent);color:var(--white);font-size:12px;font-weight:800;}
.bank-edit-toggle{width:100%;padding:11px;border:1px solid var(--gray-5);background:var(--white);font-size:12px;font-weight:700;color:var(--gray-2);margin:12px 0 0;letter-spacing:.03em;}
.tab-head{display:flex;justify-content:space-between;align-items:center;padding:14px 0 8px;border-bottom:1px solid var(--gray-5);}
.tab-head-title{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--gray-2);letter-spacing:.03em;}
.edit-btn{font-family:var(--font-mono);font-size:11px;color:var(--gray-2);padding:4px 12px;border:1px solid var(--gray-5);background:var(--white);cursor:pointer;letter-spacing:.03em;}

/* 共通ユーティリティ */
.growth-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gray-3);}
.growth-bar{height:2px;background:var(--gray-5);border-radius:1px;overflow:hidden;}
.growth-bar-fill{height:100%;background:var(--accent);transition:width .4s ease;}
.growth-bar-info{display:flex;justify-content:space-between;margin-top:4px;font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gray-3);}

/* 記録タブ */
.rec-cards{display:flex;gap:10px;margin:16px 0 8px;}
.rec-card{flex:1;background:var(--gray-6);padding:16px 14px;border-radius:4px;}
.rec-card.hi{background:var(--black);}
.rec-card-num{font-family:var(--font-num);font-size:42px;font-weight:900;line-height:1;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:var(--accent);}
.rec-card.hi .rec-card-num{color:var(--white);}
.rec-card-unit{font-family:var(--font-sans);font-size:13px;font-weight:700;margin-left:3px;color:var(--gray-2);}
.rec-card.hi .rec-card-unit{color:var(--gray-4);}
.rec-card-label{font-family:var(--font-sans);font-size:12px;font-weight:700;color:var(--gray-1);margin-top:8px;}
.rec-card.hi .rec-card-label{color:var(--gray-5);}
.rec-card-sub{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--gray-3);margin-top:2px;}
.rec-card.hi .rec-card-sub{color:var(--gray-3);}

.rec-period{display:flex;gap:0;margin:18px 0 4px;border:1px solid var(--gray-5);border-radius:4px;overflow:hidden;}
.rec-period-btn{flex:1;padding:10px 0;border:none;background:var(--white);font-size:13px;color:var(--gray-2);font-weight:700;transition:all .15s;}
.rec-period-btn.active{background:var(--black);color:var(--white);}

.rec-ex-block{padding:6px 0;}
.rec-chart-block{margin:16px 0 4px;padding:14px 14px 10px;background:var(--gray-6);border-radius:8px;}
.rec-chart-title{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;color:var(--black);padding-bottom:10px;}
.rec-chart-title span{font-family:var(--font-mono);font-size:10px;font-weight:400;color:var(--gray-3);letter-spacing:.03em;}
.rec-chart-unit{font-family:var(--font-mono);font-size:10px;color:var(--gray-3);margin:-4px 0 6px;}
.rec-chart-empty{font-size:12px;color:var(--gray-3);text-align:center;padding:24px 0;}
.rec-ex-select{font-family:var(--font-sans);font-size:12px;font-weight:700;color:var(--accent-dark);background:var(--white);border:1px solid var(--gray-5);border-radius:6px;padding:5px 8px;max-width:55%;}
.rec-ex-item{padding:13px 0;border-bottom:1px solid var(--gray-6);}
.rec-ex-item:last-child{border-bottom:none;}
.rec-ex-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.rec-ex-name{font-size:14px;font-weight:700;color:var(--black);}
.rec-ex-val{font-family:var(--font-num);font-size:16px;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums;}
.rec-ex-val .u{font-family:var(--font-sans);font-size:11px;font-weight:700;color:var(--gray-2);margin-left:2px;}
.rec-ex-track{height:8px;background:var(--gray-6);border-radius:4px;overflow:hidden;}
.rec-ex-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease;}
.rec-ex-meta{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gray-3);margin-top:5px;}
.rec-pb{color:var(--gray-1);}
.rec-pb-new{display:inline-block;font-family:var(--font-sans);font-size:9px;font-weight:700;color:var(--black);background:var(--accent);padding:1px 6px;border-radius:3px;margin-left:6px;letter-spacing:.02em;}
.rec-chart-pb{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gray-1);margin:-4px 0 6px;}
.rec-chart-pb b{color:var(--accent-dark);}

.rec-section-label{font-family:var(--font-mono);font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--gray-1);padding:18px 0 4px;}
.rec-empty{padding:40px 0;text-align:center;}
.rec-empty-icon{font-size:32px;margin-bottom:10px;opacity:.4;}
.rec-empty-text{font-size:13px;font-weight:500;color:var(--gray-2);line-height:1.7;}
.rec-toggle{width:100%;padding:13px;border:1px solid var(--gray-5);background:var(--white);font-size:12px;font-weight:700;color:var(--gray-2);margin-top:14px;border-radius:4px;display:flex;justify-content:center;align-items:center;gap:6px;}

/* ゲーム練習タブ */
.game-date{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--gray-2);padding:14px 0 8px;border-bottom:1px solid var(--gray-5);display:flex;justify-content:space-between;align-items:center;}
.game-section-title{font-family:var(--font-mono);font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--gray-1);padding:14px 0 8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.game-section-title span{font-size:12px;color:var(--gray-4);}
.game-checks{padding-bottom:4px;}
.game-check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-6);cursor:pointer;}
.game-check-item:last-child{border-bottom:none;}
.game-chk{width:18px;height:18px;border:2px solid var(--gray-4);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--pure-white);}
.game-chk.on{background:var(--accent);border-color:var(--accent-dark);}
.game-chk.on::after{content:'';display:block;width:5px;height:8px;border:2px solid var(--white);border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.game-chk-label{font-size:13px;font-weight:500;color:var(--gray-1);line-height:1.5;}
.game-memo-wrap{padding:12px 0;}
.game-memo{width:100%;padding:11px 12px;border:1px solid var(--gray-5);background:var(--pure-white);font-size:13px;font-weight:500;font-family:var(--font-sans);resize:none;line-height:1.7;color:var(--black);}
.game-save-btn{width:100%;padding:13px;border:none;background:var(--accent);color:var(--white);font-size:13px;font-weight:900;letter-spacing:.05em;margin-top:4px;}
.game-save-btn:disabled{opacity:.3;}
.game-history{padding-top:4px;}
.game-hist-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gray-2);padding:16px 0 10px;border-top:1px solid var(--gray-5);}
.game-hist-item{border-bottom:1px solid var(--gray-5);cursor:pointer;}
.game-hist-item:last-child{border-bottom:none;}
.game-hist-header{display:flex;align-items:center;justify-content:space-between;padding:11px 0;gap:8px;}
.game-hist-date{font-family:var(--font-mono);font-size:13px;font-weight:800;color:var(--black);}
.game-hist-tags{display:flex;gap:4px;flex-wrap:wrap;}
.game-hist-tag{font-family:var(--font-mono);font-size:9px;font-weight:700;padding:3px 7px;background:var(--gray-6);color:var(--gray-2);}
.game-hist-tag.hi{background:var(--accent);color:var(--white);font-weight:800;}
.game-hist-body{padding-bottom:12px;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const{useState,useEffect,useCallback}=React;
const h=React.createElement;

const MATCH_DATE=ld("mu_matchdate","2026-10-03");
const DEFAULT_BANK={
  "筋トレ":[
    {id:"sq",name:"スクワット（爆発的）",type:"reps"},
    {id:"bs",name:"ブルガリアンスクワット",type:"reps"},
    {id:"pu",name:"プッシュアップ",type:"reps"},
    {id:"dl",name:"デッドリフト",type:"reps"},
    {id:"lu",name:"ランジ",type:"reps"},
    {id:"gb",name:"グルートブリッジ（片脚）",type:"reps"},
    {id:"ls",name:"ラテラルステップ",type:"time"},
    {id:"su",name:"スーパーマン",type:"reps"},
  ],
  "体幹":[
    {id:"pl",name:"プランク",type:"time"},
    {id:"sp",name:"サイドプランク",type:"time"},
    {id:"bd",name:"バードドッグ",type:"reps"},
    {id:"rt",name:"ロシアンツイスト",type:"reps"},
    {id:"pb",name:"片脚バランス（目閉じ）",type:"time"},
    {id:"cr",name:"クランチ",type:"reps"},
  ],
  "バドミントン練習":[
    {id:"fw",name:"6点フットワーク",type:"time"},
    {id:"ts",name:"タオル素振り（スマッシュ）",type:"reps"},
    {id:"ta",name:"タオル素振り（全ショット）",type:"reps"},
    {id:"sh",name:"チャリチャリ（半面シングルス）",type:"time"},
    {id:"im",name:"イメージトレーニング",type:"time"},
    {id:"st",name:"動的ストレッチ",type:"time"},
  ],
};
const GAME_CHECKS=[
  {cat:"フットワーク",items:[
    {id:"fw1",label:"後ろへの第一歩が速かった"},
    {id:"fw2",label:"センターに常に戻れた"},
    {id:"fw3",label:"つま先重心で構えられた"},
    {id:"fw4",label:"スプリットステップができた"},
  ]},
  {cat:"構え・準備",items:[
    {id:"st1",label:"相手のラケットを見てから動けた"},
    {id:"st2",label:"ラケットを前に上げて準備できた"},
    {id:"st3",label:"浮き球を見逃さなかった"},
  ]},
  {cat:"攻撃",items:[
    {id:"at1",label:"スマッシュのタイミングが合った"},
    {id:"at2",label:"ネット前でプッシュで仕留めた"},
    {id:"at3",label:"高い打点で打てた"},
  ]},
  {cat:"戦術（ミックス）",items:[
    {id:"tc1",label:"パートナーをうまく前に出せた"},
    {id:"tc2",label:"サイドバイサイドに素早く戻れた"},
    {id:"tc3",label:"相手のバック側を狙えた"},
    {id:"tc4",label:"相手の前衛を動かせた"},
  ]},
  {cat:"メンタル",items:[
    {id:"mt1",label:"連続失点後に切り替えられた"},
    {id:"mt2",label:"パートナーに声をかけられた"},
    {id:"mt3",label:"ミスを引きずらなかった"},
  ]},
];

function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function daysLeft(){return Math.max(0,Math.ceil((new Date(MATCH_DATE)-new Date())/86400000));}
function totalDaysFromStart(){
  const start=ld("mu_start",null);
  const today=todayStr();
  if(!start){sv("mu_start",today);return Math.max(1,Math.ceil((new Date(MATCH_DATE)-new Date(today+"T00:00:00"))/86400000));}
  return Math.max(1,Math.ceil((new Date(MATCH_DATE)-new Date(start+"T00:00:00"))/86400000));
}
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// トレーニングログタブ
function LogTab({logs,onSave,onDelete,onDone,isDone,bank}){
  const[inputId,setInputId]=useState(null);
  const[reps,setReps]=useState("");
  const[sets,setSets]=useState("");
  const[time,setTime]=useState("");
  const[memo,setMemo]=useState("");
  const t=todayStr();
  const todayLogs=logs[t]||[];

  const getEx=id=>{for(const c of Object.values(bank))for(const e of c)if(e.id===id)return e;return null;};
  const getPrev=(id)=>{
    const dates=Object.keys(logs).filter(d=>d!==t&&logs[d].some(l=>l.id===id)).sort().reverse();
    return dates.length?logs[dates[0]].find(l=>l.id===id):null;
  };
  const diffLabel=(cur,prev,type)=>{
    if(!prev)return null;
    if(type==="reps"){
      const cVal=parseInt(cur.reps);
      const pVal=parseInt(prev.reps);
      if(isNaN(cVal)||isNaN(pVal))return null;
      if(cVal>pVal)return"前回 +"+(cVal-pVal)+"回";
      if(cVal===pVal)return"前回と同じ";
      return"前回 −"+(pVal-cVal)+"回";
    }else{
      const cT=parseInt(cur.time),pT=parseInt(prev.time);
      if(isNaN(cT)||isNaN(pT))return null;
      if(cT>pT)return"前回 +"+(cT-pT)+"秒";
      if(cT===pT)return"前回と同じ";
      return"前回 −"+(pT-cT)+"秒";
    }
  };

  const open=ex=>{setInputId(ex.id);setReps("");setSets("");setTime("");setMemo("");};
  const cancel=()=>setInputId(null);
  const save=()=>{
    const ex=getEx(inputId);
    if(!ex)return;
    const entry={id:inputId,name:ex.name,type:ex.type,reps,sets,time,memo,ts:Date.now()};
    onSave(t,entry);
    setInputId(null);
  };

  const renderItem=ex=>{
        const isOpen=inputId===ex.id;
        const alreadyLogged=todayLogs.some(l=>l.id===ex.id);
        const prev=getPrev(ex.id);
        return h("div",{key:ex.id},
          h("div",{className:"bank-item",onClick:()=>isOpen?cancel():open(ex)},
            h("div",{className:"bank-name"+(alreadyLogged?" ":" "),style:{flex:1,minWidth:0}},
              alreadyLogged&&h("span",{style:{display:"inline-block",width:6,height:6,background:"var(--black)",borderRadius:"50%",marginRight:6,verticalAlign:"middle"}}),
              ex.name),
            prev&&!isOpen&&h("div",{className:"bank-prev"},
              ex.type==="reps"
                ?[h("span",{key:"a",className:"num"},prev.reps),"回"]
                :[h("span",{key:"a",className:"num"},prev.time),"秒"]),
            h("div",{className:"bank-add"},isOpen?"×":"+")),
          isOpen&&h("div",{className:"log-input-wrap"},
            h("div",{className:"log-input-name"},ex.name),
            ex.type==="reps"
              ?h("div",{className:"log-input-row"},
                  h("div",{className:"log-input-label"},"回数"),
                  h("input",{type:"number",inputMode:"numeric",value:reps,onChange:x=>setReps(x.target.value),className:"log-input"}),
                  h("div",{className:"log-input-label",style:{textAlign:"center"}},"回"))
              :h("div",{className:"log-input-row"},
                  h("div",{className:"log-input-label"},"時間"),
                  h("input",{type:"number",inputMode:"numeric",value:time,onChange:x=>setTime(x.target.value),placeholder:"30",className:"log-input"}),
                  h("div",{className:"log-input-label",style:{textAlign:"center"}},"秒")),
            h("div",{className:"log-input-btns"},
              h("button",{onClick:save,className:"log-save"},"記録する"),
              h("button",{onClick:cancel,className:"log-cancel"},"キャンセル"))));
  };

  return h("div",null,
    h("div",{className:"ex-bank",style:{paddingTop:6}},
      Object.entries(bank).map(([c,exs])=>h("div",{key:c},
        h("div",{className:"bank-cat-head"},c),
        (exs||[]).map(renderItem)))),
    h("div",{className:"log-today"},
      todayLogs.length>0&&h("div",{className:"log-today-card"},
        h("div",{className:"log-today-head"},
          h("span",{className:"log-today-title"},"今日記録した種目"),
          h("span",{className:"log-today-count"},todayLogs.length+"件")),
        todayLogs.slice().reverse().map((l,i)=>{
          const prev=getPrev(l.id);
          const diff=prev?diffLabel(l,prev,l.type):null;
          const isUp=diff&&diff.indexOf("+")>=0;
          return h("div",{key:l.ts||i,className:"log-entry"},
            h("div",{style:{flex:1}},
              h("div",{className:"log-entry-name"},l.name),
              h("div",{className:"log-entry-detail"},
                l.type==="reps"
                  ?(l.reps?[h("span",{key:"r",className:"num"},l.reps),"回"]:"—")
                  :(l.time?[h("span",{key:"t",className:"num"},l.time),"秒"]:"—"))),
            diff&&h("div",{className:"log-entry-diff"+(isUp?" up":" same")},diff),
            h("button",{className:"log-entry-del",onClick:()=>onDelete(t,l.ts)},"×"));
        }),
        h("button",{onClick:onDone,className:"log-done-btn "+(isDone?"done":"idle")},
          isDone?"今日の記録完了 — タップで取消":"今日の記録を完了"))));
}

// カレンダー
function CalTab({done,logs,gameLogs}){
  const[calY,setCalY]=useState(new Date().getFullYear());
  const[calM,setCalM]=useState(new Date().getMonth());
  const[selDs,setSelDs]=useState(null);
  const t=todayStr();
  const first=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const dsOf=d=>`${calY}-${String(calM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const chM=d=>{let m=calM+d,y=calY;if(m>11){m=0;y++;}if(m<0){m=11;y--;}setCalY(y);setCalM(m);setSelDs(null);};

  const getCheckedLabels=ids=>{
    const out=[];
    for(const sec of GAME_CHECKS)for(const item of sec.items)if(ids.includes(item.id))out.push(item.label);
    return out;
  };

  const Detail=({ds})=>{
    const dayLogs=logs[ds]||[];
    const gameLog=gameLogs[ds];
    const isMatch=ds===MATCH_DATE;
    if(isMatch)return h("div",{style:{padding:"12px 0",fontWeight:700,fontSize:13}},"🏸 試合当日");
    if(!dayLogs.length&&!gameLog)return h("div",{style:{padding:"12px 0",fontSize:12,color:"var(--gray-3)"}},"記録なし");
    return h("div",{style:{paddingTop:12}},
      dayLogs.length>0&&h("div",{style:{marginBottom:12}},
        h("div",{className:"growth-label",style:{marginBottom:8}},"トレーニング"),
        dayLogs.map((l,i)=>h("div",{key:i,style:{fontSize:12,color:"var(--gray-1)",padding:"4px 0",borderBottom:"1px solid var(--gray-6)"}},
          h("span",{style:{fontWeight:500}},l.name),
          h("span",{style:{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--gray-3)",marginLeft:8}},
            l.type==="reps"?(l.reps?l.reps+"回":"—"):(l.time?l.time+"秒":"—"))))),
      gameLog&&h("div",null,
        h("div",{className:"growth-label",style:{marginBottom:8}},"ゲーム練習"),
        getCheckedLabels(gameLog.checks).map((lb,i)=>h("div",{key:i,style:{fontSize:12,color:"var(--gray-1)",padding:"3px 0",display:"flex",gap:6,alignItems:"center"}},
          h("span",{style:{width:5,height:5,borderRadius:"50%",background:"var(--black)",flexShrink:0,display:"inline-block"}}),lb)),
        gameLog.memo&&h("div",{style:{marginTop:8,fontSize:12,color:"var(--gray-2)",lineHeight:1.7,borderLeft:"2px solid var(--gray-5)",paddingLeft:8}},gameLog.memo)));
  };

  return h("div",null,
    h("div",{className:"cal-nav"},
      h("button",{onClick:()=>chM(-1),className:"cal-nav-btn"},"‹"),
      h("div",{className:"cal-month"},calY+"年 "+(calM+1)+"月"),
      h("button",{onClick:()=>chM(1),className:"cal-nav-btn"},"›")),
    h("div",{className:"cal-dow"},["日","月","火","水","木","金","土"].map((d,i)=>h("div",{key:i,className:"cal-dow-cell"},d))),
    h("div",{className:"cal-grid"},
      [...Array(first).fill(null).map((_,i)=>h("div",{key:"e"+i})),
      ...Array.from({length:dim},(_,i)=>{
        const d=i+1,ds=dsOf(d);
        const isT=ds===t,isDn=!!done[ds],isM=ds===MATCH_DATE,isSel=ds===selDs;
        const hasGame=!!gameLogs[ds];
        let cls="cal-cell";
        if(isT)cls+=" today";
        else if(isDn)cls+=" done-day";
        if(isM)cls+=" match-day";
        return h("div",{key:d,className:cls,style:{border:isSel?"1.5px solid var(--black)":"",cursor:"pointer"},
          onClick:()=>setSelDs(ds===selDs?null:ds)},
          h("div",{style:{fontSize:12,fontFamily:"var(--font-mono)"}},d),
          hasGame&&!isT&&h("div",{style:{width:3,height:3,borderRadius:"50%",background:isDn?"var(--white)":"var(--black)",margin:"1px auto 0"}}),
          isM&&h("div",{style:{fontSize:7,color:isT?"#fff":"#111"}},"試合"));
      })]),
    selDs&&h("div",{style:{margin:"12px 0",padding:"12px 14px",background:"var(--gray-6)",borderLeft:"2px solid var(--black)"}},
      h("div",{style:{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:500,marginBottom:4}},
        new Date(selDs+"T12:00:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})),
      h(Detail,{ds:selDs})));
}


// 記録タブ
function RecordTab({logs,done}){
  const[period,setPeriod]=useState("week");
  const[showAll,setShowAll]=useState(false);
  const[selEx,setSelEx]=useState("");

  const now=new Date();

  const inPeriod=ds=>{
    const d=new Date(ds+"T12:00:00");
    if(period==="week"){
      const dow=now.getDay();
      const weekStart=new Date(now);weekStart.setDate(now.getDate()-dow);weekStart.setHours(0,0,0,0);
      return d>=weekStart&&d<=now;
    }else{
      return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    }
  };

  const aggregate=dates=>{
    const m={};
    dates.forEach(ds=>{
      (logs[ds]||[]).forEach(l=>{
        if(!m[l.name])m[l.name]={name:l.name,type:l.type,count:0,total:0};
        m[l.name].count++;
        if(l.type==="reps"&&l.reps)m[l.name].total+=parseInt(l.reps);
        if(l.type==="time"&&l.time)m[l.name].total+=parseInt(l.time);
      });
    });
    return Object.values(m).sort((a,b)=>b.count-a.count);
  };

  // 期間内
  const periodDays=Object.keys(logs).filter(ds=>inPeriod(ds)&&logs[ds].length>0);
  const trainDays=periodDays.length;
  const exList=aggregate(periodDays);
  const maxCount=exList.length?exList[0].count:1;

  // 全期間
  const allDays=Object.keys(done).filter(x=>done[x]).length;
  const allExList=aggregate(Object.keys(logs));
  const allMax=allExList.length?allExList[0].count:1;

  const weekTarget=6;
  const periodLabel=period==="week"?"今週":"今月";

  // === 自己ベスト：種目ごとの「1日の合計」の最大値 ===
  const tStr=todayStr();
  const pbMap={};      // name -> {v,type,date}
  const todayVal={};   // name -> 今日の1日合計
  const priorBest={};  // name -> 今日を除く過去最高
  Object.keys(logs).forEach(ds=>{
    const dayVals={};
    (logs[ds]||[]).forEach(l=>{
      const v=l.type==="reps"?(parseInt(l.reps)||0):(parseInt(l.time)||0);
      if(!dayVals[l.name])dayVals[l.name]={type:l.type,v:0};
      dayVals[l.name].v+=v;
    });
    Object.entries(dayVals).forEach(([name,o])=>{
      if(!pbMap[name]||o.v>pbMap[name].v)pbMap[name]={v:o.v,type:o.type,date:ds};
      if(ds===tStr)todayVal[name]=o.v;
      else if(o.v>(priorBest[name]||0))priorBest[name]=o.v;
    });
  });
  // 今日が自己ベスト更新したか（過去にも記録があり、それを上回った場合）
  const pbUpdated={};
  Object.keys(todayVal).forEach(name=>{
    if((priorBest[name]||0)>0&&todayVal[name]>priorBest[name])pbUpdated[name]=true;
  });

  // === 週ごとの練習量（直近8週） ===
  const weekly=[];
  {
    const dow=now.getDay();
    const thisStart=new Date(now);thisStart.setDate(now.getDate()-dow);thisStart.setHours(0,0,0,0);
    for(let w=7;w>=0;w--){
      const wsT=thisStart.getTime()-w*7*86400000;
      const weT=wsT+7*86400000;
      let cnt=0;
      Object.keys(logs).forEach(ds=>{
        if((logs[ds]||[]).length>0){
          const dt=new Date(ds+"T12:00:00").getTime();
          if(dt>=wsT&&dt<weT)cnt++;
        }
      });
      const ws=new Date(wsT);
      weekly.push({label:(ws.getMonth()+1)+"/"+ws.getDate(),cnt});
    }
  }
  const wMax=Math.max(weekTarget,...weekly.map(x=>x.cnt));

  // === 種目の伸び（選択種目の推移） ===
  const activeEx=selEx||(allExList[0]&&allExList[0].name)||"";
  const exType=(()=>{for(const ds of Object.keys(logs))for(const l of logs[ds])if(l.name===activeEx)return l.type;return"reps";})();
  const series=Object.keys(logs).filter(ds=>(logs[ds]||[]).some(l=>l.name===activeEx)).sort().map(ds=>{
    let v=0;
    logs[ds].forEach(l=>{
      if(l.name!==activeEx)return;
      if(l.type==="reps"&&l.reps)v+=parseInt(l.reps);
      else if(l.type==="time"&&l.time)v+=parseInt(l.time);
    });
    const d=new Date(ds+"T12:00:00");
    return{label:(d.getMonth()+1)+"/"+d.getDate(),v};
  }).filter(s=>s.v>0).slice(-8);

  // 棒グラフSVG
  const BarChart=()=>{
    const W=320,top=14,chartH=86,baseY=top+chartH,slot=(W-16)/8,bw=22;
    return h("svg",{viewBox:"0 0 "+W+" "+(baseY+22),width:"100%",style:{display:"block"}},
      weekly.map((wk,i)=>{
        const x=8+i*slot+(slot-bw)/2;
        const bh=Math.max(2,Math.round(wk.cnt/wMax*chartH));
        const y=baseY-bh;
        return h("g",{key:i},
          h("rect",{x,y,width:bw,height:bh,rx:3,fill:wk.cnt>0?"var(--accent)":"var(--gray-5)"}),
          wk.cnt>0&&h("text",{x:x+bw/2,y:y-4,textAnchor:"middle",fontSize:9,fontWeight:700,fill:"var(--gray-1)",fontFamily:"var(--font-mono)"},wk.cnt),
          h("text",{x:x+bw/2,y:baseY+15,textAnchor:"middle",fontSize:8,fill:"var(--gray-3)",fontFamily:"var(--font-mono)"},wk.label));
      }));
  };

  // 折れ線SVG
  const LineChart=()=>{
    if(series.length<1)return h("div",{className:"rec-chart-empty"},"この種目の記録がまだありません");
    const W=320,top=20,bot=26,padL=14,padR=14,innerW=W-padL-padR,innerH=120-top-bot,H=120;
    const maxV=Math.max(1,...series.map(s=>s.v));
    const pts=series.map((s,i)=>{
      const x=series.length>1?padL+i*(innerW/(series.length-1)):padL+innerW/2;
      const y=top+innerH-(s.v/maxV)*innerH;
      return{x,y,...s};
    });
    const poly=pts.map(p=>p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
    const pbIdx=pts.reduce((bi,p,i)=>p.v>pts[bi].v?i:bi,0);
    return h("svg",{viewBox:"0 0 "+W+" "+H,width:"100%",style:{display:"block"}},
      series.length>1&&h("polyline",{points:poly,fill:"none",stroke:"var(--accent-dark)",strokeWidth:2,strokeLinejoin:"round",strokeLinecap:"round"}),
      pts.map((p,i)=>{
        const isPB=i===pbIdx;
        return h("g",{key:i},
          h("circle",{cx:p.x,cy:p.y,r:isPB?5:3.5,fill:isPB?"var(--accent-dark)":"var(--white)",stroke:"var(--accent-dark)",strokeWidth:2}),
          isPB&&h("text",{x:p.x,y:p.y-15,textAnchor:"middle",fontSize:11},"★"),
          h("text",{x:p.x,y:p.y-8,textAnchor:"middle",fontSize:9,fontWeight:700,fill:"var(--gray-1)",fontFamily:"var(--font-mono)"},p.v),
          h("text",{x:p.x,y:H-8,textAnchor:"middle",fontSize:8,fill:"var(--gray-3)",fontFamily:"var(--font-mono)"},p.label));
      }));
  };

  const ExItem=({ex,max})=>{
    const pb=pbMap[ex.name];
    const unit=ex.type==="reps"?"回":"秒";
    return h("div",{className:"rec-ex-item"},
      h("div",{className:"rec-ex-head"},
        h("div",{className:"rec-ex-name"},ex.name),
        h("div",{className:"rec-ex-val"},ex.count,h("span",{className:"u"},"回"))),
      h("div",{className:"rec-ex-track"},h("div",{className:"rec-ex-fill",style:{width:Math.round(ex.count/max*100)+"%"}})),
      h("div",{className:"rec-ex-meta"},
        ex.total>0&&h("span",null,"累計 "+ex.total+" "+unit),
        pb&&h("span",{className:"rec-pb"},(ex.total>0?" ・ ":"")+"自己最高 "+pb.v+" "+unit),
        pbUpdated[ex.name]&&h("span",{className:"rec-pb-new"},"🏆 自己ベスト更新!")));
  };

  return h("div",null,
    // グラフ：週ごとの練習量
    h("div",{className:"rec-chart-block",style:{marginTop:16}},
      h("div",{className:"rec-chart-title"},"練習量の推移",h("span",null,"週ごとの練習日数")),
      h(BarChart)),

    // グラフ：種目の伸び
    allExList.length>0&&h("div",{className:"rec-chart-block"},
      h("div",{className:"rec-chart-title"},"種目の伸び",
        h("select",{className:"rec-ex-select",value:activeEx,onChange:e=>setSelEx(e.target.value)},
          allExList.map(ex=>h("option",{key:ex.name,value:ex.name},ex.name)))),
      h("div",{className:"rec-chart-unit"},exType==="reps"?"1日の合計回数":"1日の合計秒数"),
      pbMap[activeEx]&&h("div",{className:"rec-chart-pb"},
        "★ 自己最高 ",h("b",null,pbMap[activeEx].v+(exType==="reps"?"回":"秒")),
        "（"+(()=>{const d=new Date(pbMap[activeEx].date+"T12:00:00");return(d.getMonth()+1)+"/"+d.getDate();})()+"）"),
      h(LineChart)),

    // 期間切替
    h("div",{className:"rec-period"},
      h("button",{onClick:()=>setPeriod("week"),className:"rec-period-btn"+(period==="week"?" active":"")},"今週"),
      h("button",{onClick:()=>setPeriod("month"),className:"rec-period-btn"+(period==="month"?" active":"")},"今月")),

    // 期間内の種目別
    exList.length>0
      ?h("div",{className:"rec-ex-block"},
          h("div",{className:"rec-chart-title",style:{paddingTop:0}},periodLabel+"の種目別 記録回数"),
          exList.map((ex,i)=>h(ExItem,{key:i,ex,max:maxCount})))
      :h("div",{className:"rec-empty"},
          h("div",{className:"rec-empty-icon"},"🏸"),
          h("div",{className:"rec-empty-text"},periodLabel+"の記録はまだありません。",h("br"),"「トレーニング」タブから記録してみましょう。")),

    // 全期間（折りたたみ）
    allExList.length>0&&h("div",null,
      h("button",{onClick:()=>setShowAll(v=>!v),className:"rec-toggle"},
        showAll?"全期間の種目を閉じる":"全期間の種目を見る",h("span",null,showAll?"▲":"▼")),
      showAll&&h("div",{className:"rec-ex-block",style:{marginTop:8}},
        allExList.map((ex,i)=>h(ExItem,{key:i,ex,max:allMax})))));
}

// タッチ対応ドラッグ並べ替え
function ReorderRows({items,onReorder,renderRow,keyOf,rowClass}){
  const kf=keyOf||(it=>it.id);
  const[order,setOrder]=useState(items);
  const[dragKey,setDragKey]=useState(null);
  const dragging=React.useRef(false);
  const orderRef=React.useRef(items);
  const elsRef=React.useRef({});
  useEffect(()=>{if(!dragging.current){setOrder(items);orderRef.current=items;}},[items]);
  const start=(e,key)=>{
    e.preventDefault();
    dragging.current=true;setDragKey(key);
    const move=ev=>{
      const y=ev.touches?ev.touches[0].clientY:ev.clientY;
      const cur=orderRef.current;
      const from=cur.findIndex(it=>kf(it)===key);
      if(from<0)return;
      let target=from;
      for(let i=0;i<cur.length;i++){
        const n=elsRef.current[kf(cur[i])];if(!n)continue;
        const r=n.getBoundingClientRect();
        if(y<r.top+r.height/2){target=i;break;}
        target=i;
      }
      if(target!==from){
        const next=cur.slice();const[m]=next.splice(from,1);next.splice(target,0,m);
        orderRef.current=next;setOrder(next);
      }
    };
    const up=()=>{
      dragging.current=false;setDragKey(null);
      document.removeEventListener("pointermove",move);
      document.removeEventListener("pointerup",up);
      onReorder(orderRef.current);
    };
    document.addEventListener("pointermove",move);
    document.addEventListener("pointerup",up);
  };
  return h("div",null,order.map(it=>h("div",{
    key:kf(it),ref:n=>{if(n)elsRef.current[kf(it)]=n;},
    className:(rowClass||"reorder-row")+(dragKey===kf(it)?" dragging":"")},
    h("div",{className:"drag-handle",onPointerDown:e=>start(e,kf(it)),style:{touchAction:"none"}},"⠿"),
    renderRow(it))));
}

  const del=()=>{
    if(!confirm(form.name+" を削除しますか？"))return;
    onUpdate(people.filter(x=>x.id!==editId));setEditId(null);
  };

  const relClass=r=>r==="ライバル"?" rival":r==="パートナー"?" partner":"";
  const sorted=people.slice().sort((a,b)=>(b.ts||0)-(a.ts||0));
  const q=query.trim().toLowerCase();
  const filtered=sorted.filter(p=>
    (fRel==="すべて"||p.relation===fRel)&&
    (!q||(p.name||"").toLowerCase().indexOf(q)>=0||(p.club||"").toLowerCase().indexOf(q)>=0));

  const OptRow=({opts,val,onPick})=>h("div",{className:"ppl-opt-row"},
    opts.map(o=>h("button",{key:o,onClick:()=>onPick(o),className:"ppl-opt"+(val===o?" on":"")},o)));

  // 新規・編集フォーム
  if(editId!==null)return h("div",null,
    h("div",{className:"tab-head"},
      h("div",{className:"tab-head-title"},editId==="new"?"人物を追加":"人物を編集"),
      h("button",{onClick:cancel,className:"edit-btn"},"キャンセル")),
    h("div",{style:{paddingTop:14}},
      h("div",{className:"ppl-field-label"},"名前"),
      h("input",{value:form.name,onChange:e=>setForm({...form,name:e.target.value}),className:"ppl-input"}),
      h("div",{className:"ppl-field-label"},"クラブ・所属"),
      h("input",{value:form.club,onChange:e=>setForm({...form,club:e.target.value}),className:"ppl-input"}),
      h("div",{className:"ppl-field-label"},"区分"),
      h(OptRow,{opts:REL,val:form.relation,onPick:v=>setForm({...form,relation:v})}),
      h("div",{className:"ppl-field-label"},"利き手"),
      h(OptRow,{opts:HAND,val:form.hand,onPick:v=>setForm({...form,hand:v})}),
      h("div",{className:"ppl-field-label"},"レベル"),
      h(OptRow,{opts:LV,val:form.level,onPick:v=>setForm({...form,level:v})}),
      h("div",{className:"ppl-field-label"},"強み"),
      h("input",{value:form.strength,onChange:e=>setForm({...form,strength:e.target.value}),className:"ppl-input"}),
      h("div",{className:"ppl-field-label"},"弱み・狙い目"),
      h("input",{value:form.weakness,onChange:e=>setForm({...form,weakness:e.target.value}),className:"ppl-input"}),
      h("div",{className:"ppl-field-label"},"メモ"),
      h("textarea",{rows:3,value:form.memo,onChange:e=>setForm({...form,memo:e.target.value}),className:"ppl-textarea"}),
      h("button",{onClick:save,disabled:!form.name.trim(),className:"game-save-btn"},"保存"),
      editId!=="new"&&h("button",{onClick:del,className:"ppl-del-btn"},"この人物を削除")));

  // 一覧
  return h("div",null,
    h("div",{className:"tab-head"},
      h("div",{className:"tab-head-title"},"人物ノート"),
      h("button",{onClick:startNew,className:"edit-btn"},"＋ 追加")),
    sorted.length===0
      ?h("div",{className:"ppl-empty"},"🏸",h("br"),"出会った選手を記録しましょう。",h("br"),"右上の「＋ 追加」から。")
      :h("div",{style:{paddingTop:12}},
          h("input",{value:query,onChange:e=>setQuery(e.target.value),placeholder:"名前・クラブで検索",className:"ppl-search"}),
          h("div",{className:"ppl-filter"},
            ["すべて","ライバル","パートナー","チームメイト","その他"].map(r=>
              h("button",{key:r,onClick:()=>setFRel(r),className:"ppl-fchip"+(fRel===r?" on":"")},r))),
          filtered.length===0
            ?h("div",{className:"ppl-empty",style:{padding:"20px 0"}},"該当する人物がいません")
            :filtered.map(p=>{
            const open=openId===p.id;
            return h("div",{key:p.id,className:"ppl-card"},
              h("div",{className:"ppl-card-head",onClick:()=>setOpenId(open?null:p.id)},
                h("div",{className:"ppl-name"},p.name),
                h("div",{className:"ppl-chip"+relClass(p.relation)},p.relation)),
              h("div",{className:"ppl-sub"},(p.club?p.club+" ・ ":"")+p.level+" ・ "+p.hand+"利き"),
              open&&h("div",{className:"ppl-body"},
                p.strength&&h("div",{className:"ppl-field"},
                  h("div",{className:"ppl-field-label"},"強み"),
                  h("div",{className:"ppl-field-val"},p.strength)),
                p.weakness&&h("div",{className:"ppl-field"},
                  h("div",{className:"ppl-field-label"},"弱み・狙い目"),
                  h("div",{className:"ppl-field-val weak"},p.weakness)),
                p.memo&&h("div",{className:"ppl-field"},
                  h("div",{className:"ppl-field-label"},"メモ"),
                  h("div",{className:"ppl-field-val"},p.memo)),
                h("button",{onClick:()=>startEdit(p),className:"edit-btn",style:{marginTop:4}},"✎ 編集")));
          })));
}

// 設定パネル
function Settings({onClose}){
  const[matchDate,setMatchDate]=useState(MATCH_DATE);

  const exportData=()=>{
    const data={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.indexOf("mu_")===0)data[k]=localStorage.getItem(k);
    }
    const blob=new Blob([JSON.stringify({app:"ShuttleNote",version:1,exportedAt:new Date().toISOString(),data},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="shuttlenote-backup-"+todayStr()+".json";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

  const importData=e=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const obj=JSON.parse(reader.result);
        const data=obj&&obj.data?obj.data:obj;
        if(!data||typeof data!=="object")throw new Error("形式が不正です");
        if(!confirm("現在の記録を、読み込んだバックアップで上書きします。よろしいですか？"))return;
        Object.keys(data).forEach(k=>{if(k.indexOf("mu_")===0)localStorage.setItem(k,data[k]);});
        alert("読み込みました。画面を更新します。");
        location.reload();
      }catch(err){alert("読み込みに失敗しました：このファイルはバックアップではないようです。");}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // === Excel(.xlsx) ===
  const exportXlsx=()=>{
    if(typeof XLSX==="undefined"){alert("Excel機能の読み込みに失敗しました。通信環境を確認して開き直してください。");return;}
    const logs=ld("mu_logs",{}),gameLogs=ld("mu_game",{}),ppl=ld("mu_people",[]),gchecks=ld("mu_gchecks",[]);
    const labelMap={};(gchecks||[]).forEach(sec=>(sec.items||[]).forEach(it=>labelMap[it.id]=it.label));

    const tRows=[["日付","種目","種別","回数","秒数"]];
    Object.keys(logs).sort().forEach(ds=>(logs[ds]||[]).forEach(l=>
      tRows.push([ds,l.name,l.type==="reps"?"回数":"時間",l.type==="reps"?(l.reps||""):"",l.type==="time"?(l.time||""):""])));

    const gRows=[["日付","できた項目","メモ"]];
    Object.keys(gameLogs).sort().forEach(ds=>{const g=gameLogs[ds];
      gRows.push([ds,(g.checks||[]).map(id=>labelMap[id]||id).join(" / "),g.memo||""]);});

    const pRows=[["名前","クラブ","区分","利き手","レベル","強み","弱み","メモ"]];
    (ppl||[]).forEach(p=>pRows.push([p.name||"",p.club||"",p.relation||"",p.hand||"",p.level||"",p.strength||"",p.weakness||"",p.memo||""]));

    const all={};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf("mu_")===0)all[k]=localStorage.getItem(k);}
    const rawRows=[["backup_json"],[JSON.stringify(all)]];

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(tRows),"トレーニング");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(gRows),"ゲーム練習");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pRows),"人物");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rawRows),"_backup");
    XLSX.writeFile(wb,"shuttlenote-backup-"+todayStr()+".xlsx");
  };

  const importXlsx=e=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    if(typeof XLSX==="undefined"){alert("Excel機能の読み込みに失敗しました。通信環境を確認して開き直してください。");return;}
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const wb=XLSX.read(new Uint8Array(reader.result),{type:"array"});
        const sh=wb.Sheets["_backup"];
        if(!sh)throw new Error("no backup sheet");
        const aoa=XLSX.utils.sheet_to_json(sh,{header:1});
        let json=null;
        for(const row of aoa){if(row&&row[0]&&row[0]!=="backup_json"){json=row[0];break;}}
        const data=JSON.parse(json);
        if(!data||typeof data!=="object")throw new Error("bad");
        if(!confirm("現在の記録を、読み込んだバックアップで上書きします。よろしいですか？"))return;
        Object.keys(data).forEach(k=>{if(k.indexOf("mu_")===0)localStorage.setItem(k,data[k]);});
        alert("読み込みました。画面を更新します。");
        location.reload();
      }catch(err){alert("読み込みに失敗しました。このアプリで書き出したExcelファイル（_backupシートあり）を選んでください。");}
    };
    reader.readAsArrayBuffer(file);
    e.target.value="";
  };

  const saveMatchDate=()=>{
    if(!matchDate)return;
    sv("mu_matchdate",matchDate);
    alert("試合日を保存しました。画面を更新します。");
    location.reload();
  };

  return h("div",{className:"set-overlay",onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h("div",{className:"set-sheet"},
      h("div",{className:"set-head"},
        h("div",{className:"set-title"},"設定"),
        h("button",{onClick:onClose,className:"set-close"},"×")),

      h("div",{className:"set-sec"},
        h("div",{className:"set-sec-label"},"試合日"),
        h("input",{type:"date",value:matchDate,onChange:e=>setMatchDate(e.target.value),className:"set-date-input"}),
        h("button",{onClick:saveMatchDate,className:"set-btn primary"},"試合日を保存"),
        h("div",{className:"set-note"},"カウントダウンと週ドットの基準になります。")),

      h("div",{className:"set-sec"},
        h("div",{className:"set-sec-label"},"バックアップ"),
        h("button",{onClick:exportXlsx,className:"set-btn primary"},"Excelで書き出す（保存）"),
        h("label",{className:"set-btn",style:{display:"block",textAlign:"center"}},
          "Excelを読み込む",
          h("input",{type:"file",accept:".xlsx",onChange:importXlsx,style:{display:"none"}})),
        h("div",{className:"set-note",style:{marginBottom:12}},"トレーニング・ゲーム練習・人物が見やすいシートで書き出されます。読み込みは、このアプリで書き出したExcel（_backupシート付き）にのみ対応します。"),
        h("button",{onClick:exportData,className:"set-btn"},"JSONで書き出す"),
        h("label",{className:"set-btn",style:{display:"block",textAlign:"center"}},
          "JSONを読み込む",
          h("input",{type:"file",accept:"application/json,.json",onChange:importData,style:{display:"none"}})),
        h("div",{className:"set-note"},"端末のデータ消去・機種変更に備え、ときどき書き出して保存しておくと安心です。読み込むと現在の記録は上書きされます。")),

      h("div",{className:"set-sec"},
        h("div",{className:"set-sec-label"},"このアプリについて"),
        h("div",{className:"set-note"},"ShuttleNote — 記録はすべてこの端末内にのみ保存されます。"))));
}

// App
function App(){
  const[tab,setTab]=useState(0);
  const[done,setDone]=useState(()=>ld("mu_done",{}));
  const[logs,setLogs]=useState(()=>ld("mu_logs",{}));
  const[gameLogs,setGameLogs]=useState(()=>ld("mu_game",{}));
  const[bank,setBank]=useState(()=>ld("mu_bank",DEFAULT_BANK));
  const[gameChecks,setGameChecks]=useState(()=>ld("mu_gchecks",GAME_CHECKS));
  const[people,setPeople]=useState(()=>ld("mu_people",[]));
  const[editingBank,setEditingBank]=useState(false);
  const[showSettings,setShowSettings]=useState(false);

  const md=new Date(MATCH_DATE+"T12:00:00");
  const matchLabel=(md.getMonth()+1)+"/"+md.getDate()+" 試合";

  const t=todayStr(),days=daysLeft();
  const total=totalDaysFromStart();
  const isDoneToday=!!done[t];
  const todayLogs=logs[t]||[];

  // 週ドット: 試合までの週を可視化
  const weeksLeft=Math.max(0,Math.ceil(days/7));
  const totalWeeks=Math.max(1,Math.ceil(total/7));
  // ドットは最大18個まで。総週数がそれ以下ならそのまま、超えたら18に圧縮
  const DOT_MAX=18;
  const dotCount=Math.min(DOT_MAX,totalWeeks);
  const passedWeeks=totalWeeks-weeksLeft; // 経過した週数
  const dots=Array.from({length:dotCount},(_,i)=>{
    // i番目のドットが表す進捗位置（0..1）
    const pos=(i+1)/dotCount;
    const passedRatio=passedWeeks/totalWeeks;
    const nowRatio=(passedWeeks+1)/totalWeeks;
    if(pos<=passedRatio)return"past";
    if(pos<=nowRatio)return"now";
    return"future";
  });

  const saveLog=(date,entry)=>{const n={...logs,[date]:[...(logs[date]||[]),entry]};setLogs(n);sv("mu_logs",n);};
  const deleteLog=(date,ts)=>{const arr=(logs[date]||[]).filter(l=>l.ts!==ts);const n={...logs};arr.length?n[date]=arr:delete n[date];setLogs(n);sv("mu_logs",n);};
  const saveGame=entry=>{
    const n={...gameLogs,[entry.ds]:entry};setGameLogs(n);sv("mu_game",n);
    const nd={...done,[entry.ds]:true};setDone(nd);sv("mu_done",nd);
  };
  const toggleDone=()=>{const n={...done};n[t]?delete n[t]:(n[t]=true);setDone(n);sv("mu_done",n);};
  const updateBank=nb=>{setBank(nb);sv("mu_bank",nb);};
  const updateGameChecks=nc=>{setGameChecks(nc);sv("mu_gchecks",nc);};
  const updatePeople=np=>{setPeople(np);sv("mu_people",np);};

  const TABS=["トレーニング","ゲーム練習","カレンダー","記録","人物"];

  return h("div",null,
    h("div",{id:"hdr"},
      h("div",{id:"hdr-inner"},
        h("div",{id:"hdr-top"},
          h("div",{id:"logo"},"シャトルノート"),
          h("button",{id:"set-gear",onClick:()=>setShowSettings(true),"aria-label":"設定"},"⚙")),
        h("div",{id:"hdr-dots-cap"},
          h("span",null,"あと",h("span",{className:"num"},weeksLeft),"週 ・ ",h("span",{className:"num"},days),"日"),
          h("span",null,matchLabel)),
        h("div",{id:"hdr-dots"},
          dots.map((s,i)=>h("div",{key:i,className:"hdr-dot"+(s==="past"?" past":s==="now"?" now":"")})))),
      h("div",{id:"tabbar"},TABS.map((l,i)=>h("button",{key:i,onClick:()=>{setTab(i);setEditingBank(false);},className:"tab-btn"+(tab===i?" active":"")},l)))),
    h("div",{id:"content"},
      tab===0&&h("div",null,
        editingBank
          ?h("div",null,
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0 8px",borderBottom:"1px solid var(--gray-5)"}},
                h("div",{className:"growth-label"},"メニュー編集"),
                h("button",{onClick:()=>setEditingBank(false),className:"bank-edit-cat-del"},"完了")),
              h(BankEditor,{bank,onUpdate:updateBank}))
          :h("div",null,
              h("div",{className:"tab-head"},
                h("div",{className:"tab-head-title"},"トレーニング"),
                h("button",{onClick:()=>setEditingBank(true),className:"edit-btn"},"✎ 編集")),
              h(LogTab,{logs,onSave:saveLog,onDelete:deleteLog,onDone:toggleDone,isDone:isDoneToday,bank}))),
      tab===1&&h(GameTab,{gameLogs,onSave:saveGame,gameChecks,onUpdateChecks:updateGameChecks}),
      tab===2&&h(CalTab,{done,logs,gameLogs}),
      tab===3&&h(RecordTab,{logs,done}),
      tab===4&&h(PeopleTab,{people,onUpdate:updatePeople})),
    showSettings&&h(Settings,{onClose:()=>setShowSettings(false)}));
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
